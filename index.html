<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Quinceañeras Elite Experience | Medellín & Antioquia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --oro:#C9A84C;--oro-claro:#E8C97A;--oro-brillante:#FFD700;
  --negro:#090909;--negro2:#111;--negro3:#1A1A1A;
  --blanco:#FEFEFE;--gris:#999;--gris2:#CCC;
}
html{scroll-behavior:smooth}
body{background:var(--negro);color:var(--blanco);font-family:'Inter',sans-serif;font-weight:300;overflow-x:hidden}

nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:18px 48px;background:linear-gradient(to bottom,rgba(9,9,9,.96),rgba(9,9,9,0));transition:background .4s}
nav.scrolled{background:rgba(9,9,9,.97);border-bottom:1px solid rgba(201,168,76,.12)}
.nav-brand{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;letter-spacing:.12em;color:var(--oro);text-decoration:none;text-transform:uppercase}
.nav-brand span{font-weight:400;font-style:italic}
.nav-pill{background:var(--oro);color:var(--negro);border:none;padding:11px 28px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:600;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .25s;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)}
.nav-pill:hover{background:var(--oro-claro);transform:translateY(-1px)}

.hero{min-height:100vh;position:relative;display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-bg{position:absolute;inset:0;background-size:cover;background-position:center 30%;animation:slowzoom 14s ease-in-out infinite alternate}
@keyframes slowzoom{from{transform:scale(1.04)}to{transform:scale(1.09)}}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(9,9,9,.9) 0%,rgba(9,9,9,.55) 50%,rgba(9,9,9,.85) 100%)}
.hero-glow{position:absolute;width:600px;height:600px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.15) 0%,transparent 70%);top:10%;right:5%;pointer-events:none}
.hero-content{position:relative;z-index:2;max-width:820px;padding:0 32px;text-align:center}
.hero-tag{display:inline-flex;align-items:center;gap:12px;font-size:.65rem;font-weight:600;letter-spacing:.35em;text-transform:uppercase;color:var(--oro);margin-bottom:28px}
.hero-tag::before,.hero-tag::after{content:'';width:32px;height:1px;background:var(--oro);opacity:.5}
.hero-h1{font-family:'Playfair Display',serif;font-size:clamp(2.8rem,8vw,5.8rem);font-weight:700;line-height:1.0;color:var(--blanco);text-shadow:0 2px 40px rgba(0,0,0,.5);margin-bottom:8px}
.hero-h1 em{font-style:italic;background:linear-gradient(135deg,var(--oro) 0%,var(--oro-brillante) 50%,var(--oro) 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{font-family:'Playfair Display',serif;font-size:clamp(1rem,2.5vw,1.35rem);font-style:italic;font-weight:400;color:rgba(255,255,255,.7);margin:20px 0 44px;line-height:1.5}
.hero-btns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-gold{background:linear-gradient(135deg,#C9A84C,#E8C97A,#C9A84C);background-size:200%;color:var(--negro);border:none;padding:17px 44px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .3s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);box-shadow:0 4px 24px rgba(201,168,76,.35)}
.btn-gold:hover{background-position:right;transform:translateY(-2px);box-shadow:0 8px 32px rgba(201,168,76,.5)}
.btn-outline{background:transparent;color:var(--blanco);border:1px solid rgba(255,255,255,.3);padding:17px 44px;font-family:'Inter',sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;text-decoration:none;transition:all .3s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%)}
.btn-outline:hover{border-color:var(--oro);color:var(--oro)}
.hero-stats{position:absolute;bottom:48px;left:50%;transform:translateX(-50%);display:flex;gap:48px;z-index:2}
.stat{text-align:center}
.stat-num{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:var(--oro);line-height:1}
.stat-label{font-size:.6rem;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:var(--gris);margin-top:4px}
.hero-line{position:absolute;bottom:0;left:50%;transform:translateX(-50%);width:1px;height:60px;background:linear-gradient(to bottom,var(--oro),transparent);z-index:2;opacity:.5}

.marquee-wrap{background:var(--oro);padding:14px 0;overflow:hidden;white-space:nowrap}
.marquee-track{display:inline-flex;animation:marquee 22s linear infinite}
@keyframes marquee{from{transform:translateX(0)}to{transform:translateX(-50%)}}
.marquee-item{font-size:.65rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--negro);padding:0 28px}

.bento{display:grid;grid-template-columns:repeat(12,1fr);grid-template-rows:300px 300px;gap:4px}
.bento-item{overflow:hidden;position:relative;cursor:pointer}
.bento-item img{width:100%;height:100%;object-fit:cover;transition:transform .6s ease}
.bento-item:hover img{transform:scale(1.06)}
.bento-item::after{content:'';position:absolute;inset:0;background:linear-gradient(to top,rgba(9,9,9,.55) 0%,transparent 55%);pointer-events:none}
.b1{grid-column:1/6;grid-row:1/2}.b2{grid-column:6/9;grid-row:1/2}.b3{grid-column:9/13;grid-row:1/3}.b4{grid-column:1/4;grid-row:2/3}.b5{grid-column:4/6;grid-row:2/3}.b6{grid-column:6/9;grid-row:2/3}
.bento-label{position:absolute;bottom:14px;left:16px;z-index:2;font-size:.58rem;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--oro);background:rgba(9,9,9,.65);padding:4px 10px;border-left:2px solid var(--oro)}

.sec{padding:96px 48px;max-width:1200px;margin:0 auto}
.sec-tag{font-size:.62rem;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--oro);display:flex;align-items:center;gap:16px;margin-bottom:52px}
.sec-tag::after{content:'';flex:1;height:1px;background:linear-gradient(to right,rgba(201,168,76,.3),transparent)}
.sec-h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4.5vw,3.2rem);font-weight:700;line-height:1.1;color:var(--blanco);margin-bottom:16px}
.sec-h2 em{font-style:italic;color:var(--oro-claro)}

.porque-bg{background:var(--negro2);padding:96px 48px;position:relative;overflow:hidden}
.porque-bg::before{content:'';position:absolute;top:-200px;right:-200px;width:500px;height:500px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.07) 0%,transparent 70%);pointer-events:none}
.pq-grid{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:52px}
.pq-item{padding:48px 44px;background:var(--negro3);position:relative;overflow:hidden}
.pq-item::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(to right,var(--oro),var(--oro-claro));transform:scaleX(0);transform-origin:left;transition:transform .4s}
.pq-item:hover::before{transform:scaleX(1)}
.pq-n{font-family:'Playfair Display',serif;font-size:4.5rem;font-weight:700;color:rgba(201,168,76,.07);position:absolute;top:20px;right:28px;line-height:1;pointer-events:none}
.pq-icon{font-size:2rem;margin-bottom:20px;filter:drop-shadow(0 0 8px rgba(201,168,76,.3))}
.pq-title{font-family:'Playfair Display',serif;font-size:1.4rem;font-weight:700;color:var(--blanco);margin-bottom:12px}
.pq-text{font-size:.85rem;color:var(--gris);line-height:1.8}

.paq-bg{background:linear-gradient(180deg,var(--negro) 0%,#0C0A00 50%,var(--negro) 100%);padding:96px 48px}
.paq-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;margin-top:56px}
.paq{background:var(--negro2);overflow:hidden;position:relative;transition:transform .3s;border-bottom:3px solid transparent}
.paq:hover{transform:translateY(-5px);border-bottom-color:var(--oro)}
.paq.feat{background:linear-gradient(160deg,#1C1400 0%,#111 100%);border:1px solid rgba(201,168,76,.25);border-bottom:3px solid var(--oro)}
.paq-head{padding:36px 36px 24px;border-bottom:1px solid rgba(255,255,255,.05)}
.paq-badge{font-size:.58rem;font-weight:700;letter-spacing:.22em;text-transform:uppercase;background:rgba(201,168,76,.1);border:1px solid rgba(201,168,76,.3);color:var(--oro);padding:5px 12px;display:inline-block;margin-bottom:18px}
.paq-name{font-family:'Playfair Display',serif;font-size:1.7rem;font-weight:700;color:var(--blanco);line-height:1.1;margin-bottom:6px}
.paq-cap{font-size:.7rem;font-weight:500;letter-spacing:.15em;text-transform:uppercase;color:var(--gris)}
.paq-price{font-family:'Playfair Display',serif;font-size:1.5rem;font-weight:700;color:var(--oro-claro);padding:24px 36px;border-bottom:1px solid rgba(255,255,255,.05)}
.paq-price small{font-family:'Inter',sans-serif;font-size:.62rem;font-weight:400;color:var(--gris);display:block;margin-top:4px}
.paq-items{list-style:none;padding:22px 36px;display:flex;flex-direction:column;gap:11px}
.paq-items li{font-size:.82rem;color:var(--gris2);display:flex;align-items:flex-start;gap:10px;line-height:1.4}
.paq-items li::before{content:'✦';color:var(--oro);font-size:.55rem;margin-top:3px;flex-shrink:0}
.paq-btn{display:block;text-align:center;padding:17px 36px;font-family:'Inter',sans-serif;font-size:.72rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;cursor:pointer;border:none;transition:all .3s;margin:0 36px 36px;clip-path:polygon(8px 0%,100% 0%,calc(100% - 8px) 100%,0% 100%)}
.paq:not(.feat) .paq-btn{background:transparent;border:1px solid rgba(201,168,76,.3);color:var(--oro)}
.paq:not(.feat) .paq-btn:hover{background:rgba(201,168,76,.08)}
.paq.feat .paq-btn{background:linear-gradient(135deg,var(--oro),var(--oro-claro));color:var(--negro);box-shadow:0 4px 20px rgba(201,168,76,.3)}
.paq.feat .paq-btn:hover{box-shadow:0 8px 32px rgba(201,168,76,.5)}

.test-bg{padding:96px 48px;background:var(--negro2)}
.test-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-top:56px}
.test-card{padding:44px;background:var(--negro3);border:1px solid rgba(255,255,255,.05);position:relative;transition:border-color .3s}
.test-card:hover{border-color:rgba(201,168,76,.2)}
.test-q{font-family:'Playfair Display',serif;font-size:5rem;font-weight:700;color:var(--oro);opacity:.1;position:absolute;top:12px;left:28px;line-height:1}
.test-stars{color:var(--oro);font-size:.9rem;letter-spacing:3px;margin-bottom:18px}
.test-text{font-family:'Playfair Display',serif;font-size:1.05rem;font-style:italic;color:rgba(255,255,255,.8);line-height:1.75;margin-bottom:24px;position:relative;z-index:1}
.test-autor{font-size:.7rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--oro)}
.test-ciudad{font-size:.67rem;color:var(--gris);margin-top:4px}

.urgencia{background:linear-gradient(135deg,#1C1400,#0D0B00);border-top:1px solid rgba(201,168,76,.2);border-bottom:1px solid rgba(201,168,76,.2);padding:64px 48px;text-align:center}
.urgencia-in{max-width:700px;margin:0 auto}
.urg-h3{font-family:'Playfair Display',serif;font-size:clamp(1.6rem,3vw,2.4rem);font-weight:700;color:var(--blanco);margin:16px 0 12px;line-height:1.2}
.urg-h3 em{font-style:italic;color:var(--oro-claro)}
.urg-p{font-size:.87rem;color:var(--gris);line-height:1.7;margin-bottom:32px}
.chips{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:36px}
.chip{font-size:.63rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;color:var(--negro);background:var(--oro);padding:8px 16px}

.form-sec{padding:96px 48px;background:var(--negro);position:relative;overflow:hidden}
.form-sec::before{content:'';position:absolute;bottom:-300px;left:-300px;width:700px;height:700px;border-radius:50%;background:radial-gradient(circle,rgba(201,168,76,.05) 0%,transparent 70%);pointer-events:none}
.form-in{max-width:660px;margin:0 auto;text-align:center;position:relative;z-index:1}
.form-h2{font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:700;color:var(--blanco);margin-bottom:12px;line-height:1.15}
.form-h2 em{font-style:italic;color:var(--oro-claro)}
.form-sub{font-size:.85rem;color:var(--gris);margin-bottom:48px;line-height:1.7}
.form-card{background:var(--negro2);border:1px solid rgba(201,168,76,.15);padding:48px 44px;position:relative}
.form-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(to right,var(--oro),var(--oro-claro),var(--oro))}
.fgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px;text-align:left}
.fg{display:flex;flex-direction:column;gap:7px}
.fg.full{grid-column:1/-1}
.fg label{font-size:.6rem;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:var(--oro)}
.fg input,.fg select{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.1);color:var(--blanco);padding:14px 16px;font-family:'Inter',sans-serif;font-size:.85rem;font-weight:300;outline:none;transition:border-color .3s;-webkit-appearance:none}
.fg input::placeholder{color:rgba(255,255,255,.2)}
.fg input:focus,.fg select:focus{border-color:var(--oro)}
.fg select option{background:var(--negro2);color:var(--blanco)}
.form-btn{width:100%;margin-top:8px;background:linear-gradient(135deg,#C9A84C,#E8C97A,#C9A84C);background-size:200%;color:var(--negro);border:none;padding:20px;font-family:'Inter',sans-serif;font-size:.82rem;font-weight:700;letter-spacing:.15em;text-transform:uppercase;cursor:pointer;transition:all .3s;clip-path:polygon(10px 0%,100% 0%,calc(100% - 10px) 100%,0% 100%);box-shadow:0 4px 24px rgba(201,168,76,.3)}
.form-btn:hover{background-position:right;transform:translateY(-1px);box-shadow:0 8px 32px rgba(201,168,76,.5)}
.garantias{display:flex;gap:20px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.garantia{font-size:.67rem;color:var(--gris);display:flex;align-items:center;gap:6px}
.garantia span{color:var(--oro)}

#gracias{display:none;text-align:center;padding:56px 20px}
#gracias.visible{display:block}
.grac-big{font-family:'Playfair Display',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:700;background:linear-gradient(135deg,var(--oro),var(--oro-brillante));-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin:20px 0 16px}
.grac-sub{font-size:.9rem;color:var(--gris);line-height:1.8;max-width:400px;margin:0 auto}

footer{padding:52px 48px;border-top:1px solid rgba(255,255,255,.06);background:var(--negro)}
.foot-in{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:24px}
.foot-brand{font-family:'Playfair Display',serif;font-size:1.1rem;font-weight:700;color:var(--oro);text-transform:uppercase;letter-spacing:.1em}
.foot-links{display:flex;gap:32px;list-style:none}
.foot-links a{font-size:.7rem;color:var(--gris);text-decoration:none;letter-spacing:.1em;text-transform:uppercase;transition:color .3s}
.foot-links a:hover{color:var(--oro)}
.foot-copy{font-size:.67rem;color:rgba(255,255,255,.18);text-align:center;width:100%;margin-top:20px;padding-top:20px;border-top:1px solid rgba(255,255,255,.04)}

.wa{position:fixed;bottom:28px;right:28px;width:58px;height:58px;border-radius:50%;background:#25D366;display:flex;align-items:center;justify-content:center;text-decoration:none;z-index:300;box-shadow:0 4px 24px rgba(37,211,102,.4);transition:transform .3s}
.wa:hover{transform:scale(1.12)}
.wa svg{width:30px;height:30px;fill:white}

.fade-up{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
.fade-up:nth-child(2){transition-delay:.1s}.fade-up:nth-child(3){transition-delay:.2s}.fade-up:nth-child(4){transition-delay:.3s}

@media(max-width:900px){
  nav{padding:16px 20px}
  .hero-stats{gap:24px}
  .bento{grid-template-columns:1fr 1fr;grid-template-rows:auto}
  .b1,.b2,.b3,.b4,.b5,.b6{grid-column:auto;grid-row:auto;height:220px}
  .pq-grid{grid-template-columns:1fr}
  .paq-grid{grid-template-columns:1fr}
  .test-grid{grid-template-columns:1fr}
  .fgrid{grid-template-columns:1fr}
  .fg.full{grid-column:1}
  .sec,.porque-bg,.paq-bg,.test-bg,.form-sec,.urgencia{padding:64px 20px}
  .foot-links{display:none}
}
</style>
</head>
<body>

<nav id="nav">
  <a href="#" class="nav-brand">Elite <span>Experience</span></a>
  <a href="#cotizacion" class="nav-pill">Solicitar cotización</a>
</nav>
